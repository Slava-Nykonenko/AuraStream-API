version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: aurastream_api_postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aura_admin -d aurastreamapi_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build: .
    image: aurastream_api:latest
    container_name: aurastream_api_backend
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - LOG_LEVEL=debug
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app

  redis:
    image: redis:7-alpine
    container_name: aurastream_api_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    command: celery -A core.celery.celery_app worker --loglevel=info
    volumes:
      - ./src:/app
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SMTP_HOST=mailhog
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
