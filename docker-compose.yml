version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: aurastream_api_postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aura_admin -d aurastreamapi_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build: .
    image: aurastream_api:latest
    container_name: aurastream_api_backend
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - LOG_LEVEL=debug
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app

volumes:
  postgres_data:
